# Pattern aligned with executive-search: Mongo service, Next production build, then Playwright
# against `next start` (no dev watcher in CI).

name: E2E (Playwright)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      CI: 'true'
      NODE_ENV: test
      NEXT_TELEMETRY_DISABLED: '1'
      PAYLOAD_CONFIG_PATH: ./dev/payload.config.ts
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_SERVER_URL: http://127.0.0.1:3000
      DATABASE_URL: mongodb://127.0.0.1:27017/payload-plugin-e2e
      MONGODB_URI: mongodb://127.0.0.1:27017/payload-plugin-e2e
      PAYLOAD_SECRET: e2e-payload-secret-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Cache Next.js build (dev app)
        uses: actions/cache@v5
        with:
          path: dev/.next/cache
          key: ${{ runner.os }}-next-dev-${{ hashFiles('pnpm-lock.yaml', 'dev/next.config.mjs', 'dev/app/**', 'dev/payload.config.ts', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-next-dev-

      - name: Build plugin (dist)
        run: pnpm run build

      - name: Build dev Next app
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: pnpm run build:dev

      - name: Run Playwright E2E
        env:
          # Both needed for the env-gated roundtrip specs
          # (tests/e2e/backup-create-restore.spec.ts, tests/e2e/cron-trigger.spec.ts).
          # When either secret is missing, the relevant tests self-skip.
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: pnpm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
