# Optional: deploy the `dev/` Next demo to Vercel when secrets are configured.
# Create a Vercel project with Root Directory = `dev` (or adjust working-directory below).

name: Deploy dev app (Vercel)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "dev/**"
      - "src/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-dev-vercel.yml"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect Vercel secrets
        id: vercel
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping deploy: set VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID in repo secrets."
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Install pnpm
        if: steps.vercel.outputs.enabled == 'true'
        uses: pnpm/action-setup@v5

      - name: Use Node.js
        if: steps.vercel.outputs.enabled == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies (no install scripts)
        if: steps.vercel.outputs.enabled == 'true'
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Rebuild approved native deps
        if: steps.vercel.outputs.enabled == 'true'
        run: pnpm rebuild

      - name: Deploy to Vercel (preview)
        if: steps.vercel.outputs.enabled == 'true'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: dev
